<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Pet Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              paper: 'var(--color-paper)',     // Main background
              card: 'var(--color-card)',      // Card background
              ink: 'var(--color-ink)',       // Primary text
              pencil: 'var(--color-pencil)',    // Secondary text
              sand: 'var(--color-sand)',      // Borders/Dividers
              warm: 'var(--color-warm)',      // Accents
              sage: 'var(--color-sage)',      // Soft Green
              clay: 'var(--color-clay)',      // Soft Terracotta
              gold: 'var(--color-gold)',      // Gold/Bronze accent
            },
            fontFamily: {
              sans: ['DM Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              serif: ['DM Serif Display', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', 'serif'],
              body: ['DM Sans', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-up': 'slideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'scale-in': 'scaleIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(25px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            },
            boxShadow: {
              'soft': '0 4px 24px -2px rgba(175, 140, 105, 0.10)',
              'float': '0 16px 48px -8px rgba(175, 140, 105, 0.18)',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --color-paper: #EAE0CE;
        --color-card: #FEFCF8;
        --color-ink: #3A3530;
        --color-pencil: #9A9088;
        --color-sand: #E8E0D2;
        --color-warm: #C8BEB0;
        --color-sage: #B5C1A6;
        --color-clay: #C4906A;
        --color-gold: #C0A882;
      }

      .dark {
        --color-paper: #2A2826;
        --color-card: #363330;
        --color-ink: #F4F1EA;
        --color-pencil: #B0A8A0;
        --color-sand: #4A4642;
        --color-warm: #8C8680;
        --color-sage: #8A9A7B;
        --color-clay: #D9A886;
        --color-gold: #D4BE9A;
      }

      body {
        -webkit-tap-highlight-color: transparent;
        background-color: #EAE0CE;
        background-image:
          radial-gradient(ellipse 90% 70% at 50% 20%, rgba(255, 248, 235, 0.95) 0%, transparent 65%),
          radial-gradient(ellipse at 10% 90%, rgba(196, 144, 106, 0.28) 0%, transparent 50%),
          radial-gradient(ellipse at 92% 8%, rgba(218, 190, 148, 0.32) 0%, transparent 45%),
          radial-gradient(ellipse at 50% 100%, rgba(175, 140, 105, 0.15) 0%, transparent 55%);
        background-attachment: fixed;
        font-family: 'DM Sans', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', sans-serif;
        color: var(--color-ink);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Refined Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-warm);
        border-radius: 10px;
        transition: background 0.3s;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-clay);
      }

      input, textarea, select, button {
        outline: none;
      }
      
      .font-fangsong {
        font-family: 'DM Serif Display', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', serif;
      }

      /* Hide scrollbar utility */
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Glassmorphism utility */
      .glass {
        background: rgba(254, 251, 246, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.58);
      }

      /* Warm primary button */
      .btn-warm {
        background: linear-gradient(135deg, #C4906A 0%, #B8805C 100%);
        color: #fff;
        border-radius: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 0.75rem;
        font-family: 'DM Sans', sans-serif;
        transition: all 0.3s ease;
        box-shadow: 0 8px 24px -4px rgba(196, 144, 106, 0.35);
      }
      .btn-warm:hover {
        background: linear-gradient(135deg, #B8805C 0%, #A8704C 100%);
        box-shadow: 0 12px 32px -4px rgba(196, 144, 106, 0.45);
        transform: translateY(-1px);
      }
      .btn-warm:active {
        transform: translateY(0);
      }

      /* Warm card base */
      .card-warm {
        background: rgba(254, 252, 248, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow: 0 2px 12px -2px rgba(175, 140, 105, 0.08), 0 8px 32px -4px rgba(175, 140, 105, 0.12);
      }

      /* Icon containers */
      .icon-clay {
        background: rgba(196, 144, 106, 0.12);
        color: #C4906A;
      }
      .icon-sage {
        background: rgba(181, 193, 166, 0.18);
        color: #8DA07E;
      }
      .icon-gold {
        background: rgba(192, 168, 130, 0.15);
        color: #A8906A;
      }
      .icon-warm {
        background: rgba(200, 190, 176, 0.2);
        color: #9A8C7E;
      }

      /* Reminder/list item inside card */
      .item-row {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 1rem;
        padding: 0.875rem 1rem;
      }

      /* Decorative gradient line */
      .deco-line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(192, 168, 130, 0.45), transparent);
        width: 2.5rem;
        margin: 0.75rem auto 0;
      }

      /* Page bottom fade for nav bar */
      body::after {
        content: '';
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 8rem;
        background: linear-gradient(to top, rgba(234, 224, 206, 0.95) 0%, transparent 100%);
        pointer-events: none;
        z-index: 40;
      }
      .dark body::after {
        background: linear-gradient(to top, rgba(42, 40, 38, 0.95) 0%, transparent 100%);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
