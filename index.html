<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Pet Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Raleway:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: 'var(--color-paper)',         // Main background — warm parchment
              card: 'var(--color-card)',            // Card background — cream
              ink: 'var(--color-ink)',              // Primary text — deep sepia
              pencil: 'var(--color-pencil)',        // Secondary text — warm brown
              sand: 'var(--color-sand)',            // Borders/Dividers — dusty sand
              warm: 'var(--color-warm)',            // Accents — taupe
              sage: 'var(--color-sage)',            // French sage green
              clay: 'var(--color-clay)',            // Dusty rose-terracotta
              gold: 'var(--color-gold)',            // Antique gold
              petal: 'var(--color-petal)',          // French rose petal
              lavender: 'var(--color-lavender)',    // Provençal lavender
            },
            fontFamily: {
              sans: ['Raleway', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              serif: ['Cormorant Garamond', 'Noto Serif SC', 'FangSong', 'STFangsong', '华文仿宋', 'serif'],
              body: ['Raleway', 'Noto Serif SC', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-up': 'slideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'scale-in': 'scaleIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(25px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            },
            boxShadow: {
              'soft': '0 4px 24px -4px rgba(184, 112, 104, 0.10), 0 1px 4px -1px rgba(43, 33, 26, 0.04)',
              'float': '0 16px 48px -8px rgba(184, 112, 104, 0.18), 0 4px 16px -4px rgba(43, 33, 26, 0.06)',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --color-paper: #F7F4F0;
        --color-card: #FFFEFB;
        --color-ink: #2B211A;
        --color-pencil: #8A7870;
        --color-sand: #E8DDD4;
        --color-warm: #BCA898;
        --color-sage: #7A9870;
        --color-clay: #B87068;
        --color-gold: #B89050;
        --color-petal: #C4A0A8;
        --color-lavender: #9888A8;
      }

      body {
        -webkit-tap-highlight-color: transparent;
        background-color: #F7F4F0;
        background-image:
          /* Top: soft ivory fade — like morning light through sheer curtains */
          radial-gradient(ellipse 120% 80% at 50% -5%, rgba(255, 255, 255, 1.0) 0%, transparent 58%),
          /* Lower-left: whisper of rose — faded petal */
          radial-gradient(ellipse 65% 50% at 8% 100%, rgba(184, 112, 104, 0.07) 0%, transparent 52%),
          /* Upper-right: Provençal lavender — morning mist */
          radial-gradient(ellipse 55% 45% at 96% 0%, rgba(152, 136, 168, 0.08) 0%, transparent 50%),
          /* Lower-right: botanical sage — faint herb garden */
          radial-gradient(ellipse 40% 35% at 85% 90%, rgba(122, 152, 112, 0.05) 0%, transparent 45%);
        background-attachment: fixed;
        font-family: 'Raleway', 'Noto Serif SC', sans-serif;
        color: var(--color-ink);
        transition: background-color 0.3s ease, color 0.3s ease;
        letter-spacing: 0.015em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Refined Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--color-clay), var(--color-gold));
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-clay);
      }

      input, textarea, select, button {
        outline: none;
      }

      .font-fangsong {
        font-family: 'Cormorant Garamond', 'Noto Serif SC', 'FangSong', 'STFangsong', '华文仿宋', serif;
        letter-spacing: 0.025em;
      }

      /* Hide scrollbar utility */
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Glassmorphism — pearlescent French glass */
      .glass {
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(28px) saturate(1.2);
        -webkit-backdrop-filter: blur(28px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.78);
      }

      /* French boutique primary button */
      .btn-warm {
        background: linear-gradient(135deg, #B87068 0%, #A86060 100%);
        color: #fff;
        border-radius: 0.5rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 0.7rem;
        font-family: 'Raleway', sans-serif;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 16px -4px rgba(184, 112, 104, 0.35), 0 2px 8px -2px rgba(184, 112, 104, 0.20);
      }
      .btn-warm:hover {
        background: linear-gradient(135deg, #A86058 0%, #985250 100%);
        box-shadow: 0 8px 24px -4px rgba(184, 112, 104, 0.42), 0 4px 12px -2px rgba(184, 112, 104, 0.25);
        transform: translateY(-1px);
        letter-spacing: 0.22em;
      }
      .btn-warm:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px -2px rgba(184, 112, 104, 0.25);
      }

      /* Elegant card base */
      .card-warm {
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(28px) saturate(1.15);
        -webkit-backdrop-filter: blur(28px) saturate(1.15);
        border: 1px solid rgba(255, 255, 255, 0.92);
        box-shadow:
          0 1px 2px rgba(43, 33, 26, 0.02),
          0 4px 20px -4px rgba(43, 33, 26, 0.05),
          0 16px 48px -12px rgba(184, 112, 104, 0.07);
      }

      /* Icon containers */
      .icon-clay {
        background: rgba(184, 112, 104, 0.10);
        color: #B87068;
      }
      .icon-sage {
        background: rgba(122, 152, 112, 0.14);
        color: #5E8A55;
      }
      .icon-gold {
        background: rgba(184, 144, 80, 0.12);
        color: #96782E;
      }
      .icon-warm {
        background: rgba(188, 168, 152, 0.18);
        color: #8A7870;
      }
      .icon-petal {
        background: rgba(196, 160, 168, 0.12);
        color: #9E7882;
      }
      .icon-lavender {
        background: rgba(152, 136, 168, 0.14);
        color: #7262A0;
      }

      /* Reminder/list item inside card */
      .item-row {
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.88);
        border-radius: 0.875rem;
        padding: 0.875rem 1rem;
      }

      /* Decorative gradient line — French botanical separator */
      .deco-line {
        height: 0.5px;
        background: linear-gradient(90deg, transparent, rgba(184, 144, 80, 0.32), rgba(196, 160, 168, 0.28), rgba(184, 144, 80, 0.32), transparent);
        width: 5rem;
        margin: 0.875rem auto 0;
      }

      /* Page bottom fade for nav bar */
      body::after {
        content: '';
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 8rem;
        background: linear-gradient(to top, rgba(247, 244, 240, 0.97) 0%, transparent 100%);
        pointer-events: none;
        z-index: 40;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>

</head>
  <body>
    <div id="root"></div>

</body>
</html>
