<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Pet Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              paper: 'var(--color-paper)',     // Main background
              card: 'var(--color-card)',      // Card background
              ink: 'var(--color-ink)',       // Primary text
              pencil: 'var(--color-pencil)',    // Secondary text
              sand: 'var(--color-sand)',      // Borders/Dividers
              warm: 'var(--color-warm)',      // Accents
              sage: 'var(--color-sage)',      // Soft Green
              clay: 'var(--color-clay)',      // Soft Terracotta
              gold: 'var(--color-gold)',      // Gold/Bronze accent
            },
            fontFamily: {
              sans: ['DM Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              serif: ['DM Serif Display', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', 'serif'],
              body: ['DM Sans', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-up': 'slideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'scale-in': 'scaleIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(25px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(62, 58, 54, 0.05)',
              'float': '0 10px 30px -5px rgba(62, 58, 54, 0.1)',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --color-paper: #F4F1EA;
        --color-card: #FFFFFF;
        --color-ink: #3E3A36;
        --color-pencil: #8C8680;
        --color-sand: #E6E2D8;
        --color-warm: #C5BDB0;
        --color-sage: #B5C1A6;
        --color-clay: #C79A78;
        --color-gold: #BFA884;
      }

      .dark {
        --color-paper: #2A2826;
        --color-card: #363330;
        --color-ink: #F4F1EA;
        --color-pencil: #B0A8A0;
        --color-sand: #4A4642;
        --color-warm: #8C8680;
        --color-sage: #8A9A7B;
        --color-clay: #D9A886;
        --color-gold: #D4BE9A;
      }

      body {
        -webkit-tap-highlight-color: transparent;
        background-color: var(--color-paper);
        /* Subtle noise texture for paper effect */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        font-family: 'DM Sans', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', sans-serif;
        color: var(--color-ink);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Refined Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-warm);
        border-radius: 10px;
        transition: background 0.3s;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-clay);
      }

      input, textarea, select, button {
        outline: none;
      }
      
      .font-fangsong {
        font-family: 'DM Serif Display', 'FangSong', 'STFangsong', '华文仿宋', 'Noto Serif SC', serif;
      }

      /* Glassmorphism utility */
      .glass {
        background: color-mix(in srgb, var(--color-card) 60%, transparent);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid color-mix(in srgb, var(--color-card) 50%, transparent);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
